<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - Play Game Dev Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/quizzes.css">
</head>
<body>
    <!-- HEADER/NAVBAR -->
    <header class="navbar">
        <div class="navbar-container">
            <div class="logo-section">
                <img class="logo-image" src="../images/logotipo.png" alt="Logo Play Game Dev Academy">
                <h1 class="logo">Play Game Dev Academy</h1>
                <p class="tagline">Play the Game. Mission Complete. Congratulations.</p>
            </div>
            
            <nav class="nav-links">
                <a href="../../index.html" class="nav-link">Início</a>
                <a href="../sumário/sumário.html" class="nav-link">Sumário</a>
                <a href="jogos.html" class="nav-link">Jogos</a>
                <a href="quizzes.html" class="nav-link active">Quizzes</a>
                <a href="progresso.html" class="nav-link">Progresso</a>
            </nav>

            <a href="perfil.html" class="user-profile-link">
                <img src="../images/default-profile.svg" alt="Foto de Perfil" class="profile-pic" id="profilePic">
                <span class="user-greeting">Bem-vindo, <strong id="userName">Aprendiz</strong>!</span>
            </a>

            <button class="hamburger" onclick="toggleMobileMenu()">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
    </header>

    <main class="quiz-main">
        <section id="chapterSelection" class="selection-screen">
            <div class="selection-card">
                <h2>Escolha um capítulo</h2>
                <p>Use a seleção abaixo para começar o quiz no tema desejado.</p>

                <div class="chapter-grid">
                    <button class="chapter-card" data-chapter="capitulo1">Capítulo 1<br><span>Introdução</span></button>
                    <button class="chapter-card" data-chapter="capitulo2">Capítulo 2<br><span>Conceitos básicos</span></button>
                    <button class="chapter-card" data-chapter="capitulo3">Capítulo 3<br><span>Avançado</span></button>
                </div>
            </div>
        </section>

        <section id="quizScreen" class="quiz-screen hidden">
            <div class="quiz-card">
                <div class="quiz-card-header">
                    <div>
                        <span class="quiz-label">Capítulo</span>
                        <strong id="chapterTitle">Introdução</strong>
                    </div>
                    <div class="quiz-info">
                        <span id="questionCounter">1 / 4</span>
                        <span class="quiz-timer">⏱️ <strong id="timerDisplay">15</strong>s</span>
                    </div>
                </div>

                <div class="quiz-question-box">
                    <h2 id="questionText">Carregando pergunta...</h2>
                    <div id="mediaContainer" class="quiz-media"></div>
                </div>

                <div id="optionsGrid" class="options-grid"></div>
                <div id="feedbackMessage" class="quiz-feedback hidden"></div>

                <div class="quiz-actions-row">
                    <button id="backButton" class="btn-secondary">Voltar para seleção</button>
                    <button id="nextButton" class="btn-next" disabled>Próxima</button>
                </div>
            </div>
        </section>
    </main>

    <script src="../js/quizzes.js"></script>
</body>
</html>
